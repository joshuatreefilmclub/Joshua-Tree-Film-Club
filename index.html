<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <title>Movie Suggestion</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<h1>Movie Suggestion Generator</h1>

<div class="genre-container">
    <input type="radio" name="genre" id="comedy" value="Comedy"/>
    <label for="comedy">Comedy</label>
    <input type="radio" name="genre" id="horror" value="Horror"/>
    <label for="horror">Horror</label>
    <input type="radio" name="genre" id="romance" value="Romance"/>
    <label for="romance">Romance</label>
    <input type="radio" name="genre" id="action" value="Action"/>
    <label for="action">Action</label>
    <input type="radio" name="genre" id="animated" value="Animated"/>
    <label for="animated">Animated</label>
    <input type="radio" name="genre" id="western" value="Western"/>
    <label for="western">Western</label>
    <input type="radio" name="genre" id="fantasy" value="Fantasy"/>
    <label for="fantasy">Fantasy</label>
    <input type="radio" name="genre" id="mystery" value="Mystery"/>
    <label for="mystery">Mystery</label>
    <input type="radio" name="genre" id="war" value="War"/>
    <label for="war">War</label>
    <input type="radio" name="genre" id="history" value="History"/>
    <label for="history">History</label>
</div>

<button id="genBtn">Generate Movie</button>
<button id="randomBtn">Random Movie From Any Genre</button>

<p id="text"></p>

</body>
</html>
